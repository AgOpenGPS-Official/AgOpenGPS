name: CereaBridge Build

on:
  push:
    paths:
      - 'SourceCode/CereaBridge/**'
      - 'SourceCode/Directory.Build.props'
      - '.github/workflows/cereabridge-build.yml'
  workflow_dispatch:

jobs:
  build-cereabridge:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore CereaBridge
        run: dotnet restore SourceCode/CereaBridge/CereaBridge.csproj

      - name: Build CereaBridge Debug
        run: dotnet build SourceCode/CereaBridge/CereaBridge.csproj --configuration Debug --no-restore

      - name: Publish CereaBridge Release
        run: dotnet publish SourceCode/CereaBridge/CereaBridge.csproj --configuration Release --no-restore --output artifacts/CereaBridge

      - name: Upload CereaBridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: CereaBridge-publish
          path: artifacts/CereaBridge
