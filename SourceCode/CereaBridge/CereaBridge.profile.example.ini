# Example profile for CereaBridge
# Copy to CereaBridge.profile.ini or run CereaBridge.exe --setup
# If IMU Brick is enabled, fill ImuUid or startup will warn you.

ListenPort=18888
ListenPortFallback=8888
AgioHost=127.0.0.1
AgioPort=9999

UsePhidgets=true
PhidgetsDeviceSerialNumber=0
PhidgetsMotorChannel=0
PhidgetsEncoderChannel=0
ReverseMotor=false
ReverseWas=false

UseImuBrick=true
ImuHost=localhost
ImuPort=4223
ImuUid=
ReverseRoll=false
ReverseHeading=false
HeadingOffset16=0

CountsPerDegreeFallback=30
WasOffsetFallback=0
VelocityGainMultiplier=1.0
MaxMotorOutput=1.0
DeadbandDegrees=0.25
TelemetryPeriodMs=50
HelloPeriodMs=250

SteerSwitchOn=true
WorkSwitchOn=false
